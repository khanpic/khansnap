<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작업 후기 게시판</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>📸 Khan Snap 후기 📸</header>
    <nav class="nav">
        <a href="index.html">홈</a>
        <a href="portfolio.html">포트폴리오</a>
        <a href="contact.html">예약 및 문의하기</a>
        <a href="review.html">후기</a>
    </nav>
    <div class="container">
        <h2>📸 작업 후기 게시판</h2>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="name" placeholder="이름을 입력하세요" required>
        </div>
        
        <div class="input-group">
            <i class="fas fa-comment"></i>
            <textarea id="review" placeholder="후기를 작성하세요" required></textarea>
        </div>

        <button onclick="addReview()">등록하기</button>

        <div class="review-list" id="reviewList"></div>
    </div>

    <script>
        function loadReviews() {
            let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
            let reviewList = document.getElementById("reviewList");
            reviewList.innerHTML = "";

            reviews.forEach((review) => {
                let reviewItem = document.createElement("div");
                reviewItem.classList.add("review-item");
                reviewItem.innerHTML = `<strong>${review.name}</strong><p>${review.text}</p>`;
                reviewList.appendChild(reviewItem);
            });
        }

        function addReview() {
            let name = document.getElementById("name").value.trim();
            let reviewText = document.getElementById("review").value.trim();

            if (!name || !reviewText) {
                alert("이름과 후기를 입력하세요!");
                return;
            }

            let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
            reviews.push({ name: name, text: reviewText });
            localStorage.setItem("reviews", JSON.stringify(reviews));

            document.getElementById("name").value = "";
            document.getElementById("review").value = "";

            loadReviews();
        }

        window.onload = loadReviews;
    </script>

</body>
</html>
