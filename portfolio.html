    <title>포트폴리오 - Khan Snap</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f8f9fa;
        }
        header {
            font-family: "Nanum Pen Script:", cursive;
            font-style: italic;
            background-color: #333;
            color: white;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
        }
        .nav {
            display: flex;
            justify-content: center;
            background-color: #444;
            padding: 10px 0;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 10px;
            font-size: 18px;
        }
        .nav a:hover {
            background-color: #555;
            border-radius: 5px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .contact-links a {
            display: block;
            margin: 10px 0;
            padding: 10px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            color: white;
        }
        .instagram { background-color: #E1306C; }
        .email { background-color: #007bff; }
        .kakao { background-color: #ffeb00; color: #3c1e1e; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            border-radius: 8px;
            transition: 0.3s;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
